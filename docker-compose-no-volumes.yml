# Docker Compose file WITHOUT persistent volumes (for testing/CI)
# This provides a minimal SIH Salus setup without data persistence
# Useful for quick testing and CI/CD pipelines

services:
  backend:
    image: ${SIHSALUS_BACKEND_IMAGE:-ghcr.io/sihsalus/sihsalus-core:latest}
    depends_on:
      db:
        condition: service_healthy
    environment:
      OPENMRS_APPLICATION_DATA_DIRECTORY: /openmrs/data
      SERVER_SERVLET_CONTEXT_PATH: /openmrs
      SIHSALUS_DATASOURCE_URL: jdbc:postgresql://db:5432/${SIHSALUS_POSTGRES_DB:-sihsalus}
      SIHSALUS_DATASOURCE_USERNAME: ${SIHSALUS_POSTGRES_USER:-sihsalus}
      SIHSALUS_DATASOURCE_PASSWORD: ${SIHSALUS_POSTGRES_PASSWORD:-sihsalus}
      SIHSALUS_ADMIN_USERNAME: ${SIHSALUS_ADMIN_USERNAME:-admin}
      SIHSALUS_ADMIN_PASSWORD: ${SIHSALUS_ADMIN_PASSWORD:-Admin123}
      SIHSALUS_OCL_STATIC_IMPORT_ENABLED: ${SIHSALUS_OCL_STATIC_IMPORT_ENABLED:-false}
    healthcheck:
      test: [ "CMD-SHELL", 'curl -fsS "http://localhost:8080$${SERVER_SERVLET_CONTEXT_PATH:-/openmrs}/actuator/health/readiness" >/dev/null' ]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 45m
    ports:
      - "8080:8080"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${SIHSALUS_POSTGRES_DB:-sihsalus}
      POSTGRES_USER: ${SIHSALUS_POSTGRES_USER:-sihsalus}
      POSTGRES_PASSWORD: ${SIHSALUS_POSTGRES_PASSWORD:-sihsalus}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
