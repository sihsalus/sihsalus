name: CI

on:
  push:
    branches: [main, pre-release]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.scope.outputs.backend }}
      backup: ${{ steps.scope.outputs.backup }}
      monitoring: ${{ steps.scope.outputs.monitoring }}
      imaging: ${{ steps.scope.outputs.imaging }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Detect scoped changes
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          backend=true
          backup=true
          monitoring=true
          imaging=true

          can_diff=false
          if [ "$EVENT_NAME" != "workflow_dispatch" ] \
            && [ -n "$BASE_SHA" ] \
            && [[ ! "$BASE_SHA" =~ ^0+$ ]] \
            && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            can_diff=true
          fi

          if [ "$can_diff" = "true" ] \
            && git diff --quiet "$BASE_SHA" "$GITHUB_SHA" -- pom.xml backend/; then
            backend=false
          fi

          if [ "$can_diff" = "true" ] \
            && git diff --quiet "$BASE_SHA" "$GITHUB_SHA" -- .github/workflows/ci.yml compose/seed.yml scripts/backup/ scripts/seed/ tests/backup/ tests/seed/; then
            backup=false
          fi

          if [ "$can_diff" = "true" ] \
            && git diff --quiet "$BASE_SHA" "$GITHUB_SHA" -- .github/workflows/ci.yml compose/monitoring.yml monitoring/alloy/ tests/monitoring/; then
            monitoring=false
          fi

          if [ "$can_diff" = "true" ] \
            && git diff --quiet "$BASE_SHA" "$GITHUB_SHA" -- .github/workflows/ci.yml compose/core.yml compose/keycloak.yml compose/imaging-auth.yml gateway/ keycloak/ tests/imaging/; then
            imaging=false
          fi

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "backup=$backup" >> "$GITHUB_OUTPUT"
          echo "monitoring=$monitoring" >> "$GITHUB_OUTPUT"
          echo "imaging=$imaging" >> "$GITHUB_OUTPUT"
          echo "Backend build required: $backend"
          echo "Backup round-trip required: $backup"
          echo "Monitoring runtime test required: $monitoring"
          echo "Imaging auth runtime test required: $imaging"

  compose:
    name: Validate Compose
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Test frontend cache policy
        run: ./tests/frontend/cache-policy.sh

      - name: Validate models and invariants
        run: ./scripts/validate-compose.sh compose-validation

      - name: Write validation summary
        if: always()
        run: |
          {
            echo "## Compose validation evidence"
            echo ""
            echo "| Target | Evidence file |"
            echo "| --- | --- |"
            for file in compose-validation/*.json; do
              [ -f "$file" ] || continue
              name="$(basename "$file" .json)"
              echo "| ${name} | ${file} |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Compose evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: compose-validation
          path: compose-validation/
          if-no-files-found: warn
          retention-days: 14

  backend:
    name: Build backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up JDK 8
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build backend distribution
        run: mvn --batch-mode --update-snapshots --file backend/pom.xml clean package

  backup:
    name: Backup round-trip
    needs: changes
    if: needs.changes.outputs.backup == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Test encrypted dump and restore
        run: ./tests/backup/dump-roundtrip.sh

      - name: Test encrypted seed restore
        run: ./tests/seed/roundtrip.sh

  monitoring:
    name: Docker API proxy
    needs: changes
    if: needs.changes.outputs.monitoring == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Verify read-only Docker API
        run: ./tests/monitoring/socket-proxy.sh

  imaging:
    name: Imaging authorization
    needs: changes
    if: needs.changes.outputs.imaging == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Test anonymous denial, authorized access and logout
        run: ./tests/imaging/auth-gateway.sh

  gate:
    name: PR Gate
    if: always()
    needs: [compose, backend, backup, monitoring, imaging]
    runs-on: ubuntu-latest
    steps:
      - name: Require successful validations
        env:
          COMPOSE_RESULT: ${{ needs.compose.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          BACKUP_RESULT: ${{ needs.backup.result }}
          MONITORING_RESULT: ${{ needs.monitoring.result }}
          IMAGING_RESULT: ${{ needs.imaging.result }}
        run: |
          [ "$COMPOSE_RESULT" = "success" ]
          [ "$BACKEND_RESULT" = "success" ] || [ "$BACKEND_RESULT" = "skipped" ]
          [ "$BACKUP_RESULT" = "success" ] || [ "$BACKUP_RESULT" = "skipped" ]
          [ "$MONITORING_RESULT" = "success" ] || [ "$MONITORING_RESULT" = "skipped" ]
          [ "$IMAGING_RESULT" = "success" ] || [ "$IMAGING_RESULT" = "skipped" ]
