name: Validate Compose Configuration

on:
  push:
    branches: [pre-release]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate Compose files
        env:
          SIHSALUS_POSTGRES_PASSWORD: ci-validation-placeholder
          SIHSALUS_ADMIN_PASSWORD: ci-validation-placeholder
        run: |
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose-no-volumes.yml config

      - name: Validate Keycloak/backend OAuth2 wiring
        run: ./tests/compose/test-keycloak-backend-oauth2.sh
