name: Validate Compose Configuration

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/validate-compose.yml'
      - '.env.template'
      - 'docker-compose.yml'
      - 'docker-compose-no-volumes.yml'
      - 'compose/**'
      - 'scripts/validate-compose.sh'
      - 'gateway/**'
      - 'frontend/**'
      - 'keycloak/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/validate-compose.yml'
      - '.env.template'
      - 'docker-compose.yml'
      - 'docker-compose-no-volumes.yml'
      - 'compose/**'
      - 'scripts/validate-compose.sh'
      - 'gateway/**'
      - 'frontend/**'
      - 'keycloak/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-config:
    name: Validate Docker Compose config
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Validate Compose models and invariants
        run: ./scripts/validate-compose.sh compose-validation

      - name: Write validation summary
        if: always()
        run: |
          {
            echo "## Compose validation evidence"
            echo ""
            echo "| Target | Evidence file |"
            echo "| --- | --- |"
            for file in compose-validation/*.json; do
              name="$(basename "$file" .json)"
              echo "| ${name} | ${file} |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload compose validation evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compose-validation
          path: compose-validation/
          if-no-files-found: error
