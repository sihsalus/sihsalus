services:
  gateway:
    build:
      context: ../../gateway
    container_name: gateway
    restart: "unless-stopped"
    depends_on:
      - frontend-init
      - frontend
      - backend
    ports:
      - "80:80"

  frontend-init:
    image: ghcr.io/sihsalus/sihsalus-frontend:latest
    container_name: frontend-init
    user: "0:0"
    restart: "no"
    environment:
      SPA_OUTPUT_DIR: /spa
      SPA_PATH: /openmrs/spa
      API_URL: /openmrs
      SPA_CONFIG_URLS: /openmrs/spa/frontend.json
      SPA_DEFAULT_LOCALE: es
    volumes:
      - spa-data:/spa

  frontend:
    image: nginx:1.28-alpine
    container_name: frontend
    restart: "unless-stopped"
    environment:
      SPA_PATH: /openmrs/spa
      API_URL: /openmrs
      SPA_CONFIG_URLS:
      SPA_DEFAULT_LOCALE:
    volumes:
      - spa-data:/usr/share/nginx/html:ro
      - ../../frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1/" ]
      timeout: 5s
    depends_on:
      - frontend-init
      - backend

  backend:
    image: ${SIHSALUS_BACKEND_IMAGE:-ghcr.io/sihsalus/sihsalus-core:latest}
    container_name: backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      OPENMRS_APPLICATION_DATA_DIRECTORY: /openmrs/data
      SERVER_SERVLET_CONTEXT_PATH: /openmrs
      SIHSALUS_DATASOURCE_URL: jdbc:postgresql://db:5432/${SIHSALUS_POSTGRES_DB:-sihsalus}
      SIHSALUS_DATASOURCE_USERNAME: ${SIHSALUS_POSTGRES_USER:-sihsalus}
      SIHSALUS_DATASOURCE_PASSWORD: ${SIHSALUS_POSTGRES_PASSWORD:-sihsalus}
      SIHSALUS_ADMIN_USERNAME: ${SIHSALUS_ADMIN_USERNAME:-admin}
      SIHSALUS_ADMIN_PASSWORD: ${SIHSALUS_ADMIN_PASSWORD:-Admin123}
      SIHSALUS_OCL_STATIC_IMPORT_ENABLED: ${SIHSALUS_OCL_STATIC_IMPORT_ENABLED:-false}
    healthcheck:
      test: [ "CMD-SHELL", 'curl -fsS "http://localhost:8080$${SERVER_SERVLET_CONTEXT_PATH:-/openmrs}/actuator/health/readiness" >/dev/null' ]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 45m

  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      POSTGRES_DB: ${SIHSALUS_POSTGRES_DB:-sihsalus}
      POSTGRES_USER: ${SIHSALUS_POSTGRES_USER:-sihsalus}
      POSTGRES_PASSWORD: ${SIHSALUS_POSTGRES_PASSWORD:-sihsalus}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  spa-data:
