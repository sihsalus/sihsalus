services:
  gateway:
    build:
      context: ../../gateway
    container_name: gateway
    restart: "unless-stopped"
    depends_on:
      - frontend-init
      - frontend
      - backend
    ports:
      - "80:80"

  frontend-init:
    image: ghcr.io/sihsalus/sihsalus-frontend:latest
    container_name: frontend-init
    user: "0:0"
    restart: "no"
    environment:
      SPA_OUTPUT_DIR: /spa
      SPA_PATH: /openmrs/spa
      API_URL: /openmrs
      SPA_CONFIG_URLS: /openmrs/spa/frontend.json
      SPA_DEFAULT_LOCALE: es
    volumes:
      - spa-data:/spa

  frontend:
    image: nginx:1.28-alpine
    container_name: frontend
    restart: "unless-stopped"
    environment:
      SPA_PATH: /openmrs/spa
      API_URL: /openmrs
      SPA_CONFIG_URLS:
      SPA_DEFAULT_LOCALE:
    volumes:
      - spa-data:/usr/share/nginx/html:ro
      - ../../frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1/" ]
      timeout: 5s
    depends_on:
      - frontend-init
      - backend

  backend:
    build:
      context: ../../
      dockerfile: backend/Dockerfile
    container_name: backend
    depends_on:
      - db
    environment:
      OMRS_CONFIG_MODULE_WEB_ADMIN: "true"
      OMRS_CONFIG_AUTO_UPDATE_DATABASE: "true"
      OMRS_CONFIG_CREATE_TABLES: "true"
      OMRS_CONFIG_CONNECTION_SERVER: db
      OMRS_CONFIG_CONNECTION_DATABASE: openmrs
      OMRS_CONFIG_CONNECTION_USERNAME: ${OPENMRS_DB_USER:-openmrs}
      OMRS_CONFIG_CONNECTION_PASSWORD: ${OPENMRS_DB_PASSWORD:-openmrs}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/openmrs" ]
      timeout: 5s

  # MariaDB
  db:
    image: mariadb:10.8.2
    container_name: db
    command: "mysqld --character-set-server=utf8 --collation-server=utf8_general_ci --datadir=/openmrs-db"
    environment:
      MYSQL_DATABASE: openmrs
      MYSQL_USER: ${OPENMRS_DB_USER:-openmrs}
      MYSQL_PASSWORD: ${OPENMRS_DB_PASSWORD:-openmrs}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-openmrs}

volumes:
  spa-data:
