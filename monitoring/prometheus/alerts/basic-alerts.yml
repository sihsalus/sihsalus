groups:
  - name: sihsalus_monitoring_alerts
    interval: 30s
    rules:
      - alert: PrometheusTargetDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus target {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} from job {{ $labels.job }} has not been scrapeable for more than 5 minutes."

      - alert: SihsalusEndpointProbeFailing
        expr: probe_success{job="blackbox-http-prod"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "SIHSALUS endpoint probe failed for {{ $labels.instance }}"
          description: "Blackbox exporter has not received a successful response from {{ $labels.instance }} for more than 2 minutes."

      - alert: SihsalusEndpointSlow
        expr: probe_duration_seconds{job="blackbox-http-prod"} > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SIHSALUS endpoint is slow: {{ $labels.instance }}"
          description: "Blackbox probe duration for {{ $labels.instance }} has been above 2 seconds for more than 5 minutes."
