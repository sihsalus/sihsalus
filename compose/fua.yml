# FUA Generator (Formato Unico de Atencion - MINSA)
# Profile: fua
#
# Requires gateway env vars FUA_CONFIG and FUA_LOCATIONS in .env
# for nginx routing to the FUA service.

services:
  fua-generator:
    container_name: sihsalus-fua-generator
    image: ${FUA_GENERATOR_IMAGE:-ghcr.io/sihsalus/generador-de-fua}:${FUA_GENERATOR_TAG:-sha-8deb5ba}
    restart: "unless-stopped"
    profiles: [ fua ]
    environment:
      NODE_ENV: "production"
      DB_USER: ${SIHSALUS_FUA_GEN_DB_USER:-fuagenerator}
      DB_PASSWORD: ${SIHSALUS_FUA_GEN_DB_PASSWORD:-}
      DB_NAME: ${SIHSALUS_FUA_GEN_DB:-fuagenerator}
      TOKEN: ${SIHSALUS_FUA_GEN_TOKEN:-}
      SECRET_KEY: ${SIHSALUS_FUA_GEN_SECRET_KEY:-}
      ENCRYPTION_KEY: ${SIHSALUS_FUA_GEN_ENCRYPTION_KEY:-}
      DB_HOST: "fua-generator-db"
      DB_PORT: "5432"
    depends_on:
      fua-generator-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(response => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - default
      - services-network

  fua-generator-db:
    container_name: sihsalus-fua-generator-db
    image: postgres:17
    restart: "unless-stopped"
    profiles: [ fua ]
    environment:
      POSTGRES_USER: ${SIHSALUS_FUA_GEN_DB_USER:-fuagenerator}
      POSTGRES_PASSWORD: ${SIHSALUS_FUA_GEN_DB_PASSWORD:-}
      POSTGRES_DB: ${SIHSALUS_FUA_GEN_DB:-fuagenerator}
    volumes:
      - db-fua-generator:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SIHSALUS_FUA_GEN_DB_USER:-fuagenerator} -d ${SIHSALUS_FUA_GEN_DB:-fuagenerator}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - services-network
