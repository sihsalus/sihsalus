# FUA Generator (Formato Unico de Atencion - MINSA)
# Profile: fua
#
# Requires gateway env vars FUA_CONFIG and FUA_LOCATIONS in .env
# for nginx routing to the FUA service.

services:
  fua-generator:
    container_name: sihsalus-fua-generator
    image: ${FUA_GENERATOR_IMAGE:-marcelius733/fua-generator}:${FUA_GENERATOR_TAG:-dev-0.1.7}
    restart: "unless-stopped"
    profiles: [ fua ]
    # fua-generator dev-0.1.7 currently reads these names positionally as
    # database <- DB_USER, username <- DB_PASSWORD, password <- DB_NAME.
    # Counter-map them here until the upstream image corrects that wiring.
    environment:
      DB_USER: ${SIHSALUS_FUA_GEN_DB:-fuagenerator}
      DB_PASSWORD: ${SIHSALUS_FUA_GEN_DB_USER:-fuagenerator}
      DB_NAME: ${SIHSALUS_FUA_GEN_DB_PASSWORD:-}
      TOKEN: ${SIHSALUS_FUA_GEN_TOKEN:-}
      SECRET_KEY: ${SIHSALUS_FUA_GEN_SECRET_KEY:-}
      DB_HOST: "fua-generator-db"
      DB_PORT: "5432"
    depends_on:
      fua-generator-db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          const { Client } = require('pg');
          const client = new Client({
            database: process.env.DB_USER,
            user: process.env.DB_PASSWORD,
            password: process.env.DB_NAME,
            host: process.env.DB_HOST,
            port: Number(process.env.DB_PORT)
          });
          client.connect()
            .then(() => client.query('SELECT 1'))
            .then(() => client.end())
            .then(() => fetch('http://localhost:3000/'))
            .then(response => process.exit(response.status === 200 ? 0 : 1))
            .catch(() => process.exit(1));
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - default
      - services-network

  fua-generator-db:
    container_name: sihsalus-fua-generator-db
    image: postgres:17
    restart: "unless-stopped"
    profiles: [ fua ]
    environment:
      POSTGRES_USER: ${SIHSALUS_FUA_GEN_DB_USER:-fuagenerator}
      POSTGRES_PASSWORD: ${SIHSALUS_FUA_GEN_DB_PASSWORD:-}
      POSTGRES_DB: ${SIHSALUS_FUA_GEN_DB:-fuagenerator}
    volumes:
      - db-fua-generator:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SIHSALUS_FUA_GEN_DB_USER:-fuagenerator} -d ${SIHSALUS_FUA_GEN_DB:-fuagenerator}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - services-network
