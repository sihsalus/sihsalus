# Monitoring Stack (Grafana, Prometheus, Loki, optional Alloy log collector)
# Profile: monitoring

services:
  grafana:
    container_name: sihsalus-grafana
    image: grafana/grafana:12.3
    restart: "unless-stopped"
    profiles: [ monitoring ]
    ports:
      - "127.0.0.1:3001:3000"
    entrypoint:
      - sh
      - -euc
      - |
        if [ -z "$${GF_SECURITY_ADMIN_PASSWORD:-}" ]; then
          echo "GRAFANA_ADMIN_PASSWORD is required when enabling the monitoring profile." >&2
          exit 1
        fi
        rm -rf \
          /var/lib/grafana/plugins/grafana-clock-panel \
          /var/lib/grafana/plugins/grafana-simple-json-datasource \
          /var/lib/grafana/plugins/grafana-piechart-panel
        exec /run.sh
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SNAPSHOTS_EXTERNAL_ENABLED: "false"
      GF_LOG_LEVEL: warn
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/logs-dashboard.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - monitoring-network
      - management-network

  prometheus:
    container_name: sihsalus-prometheus
    image: prom/prometheus:v3.2.1
    restart: "unless-stopped"
    profiles: [ monitoring ]
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - monitoring-network
      - default

  blackbox:
    container_name: sihsalus-blackbox
    image: prom/blackbox-exporter:v0.27.0
    restart: "unless-stopped"
    profiles: [ monitoring ]
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:9115/-/healthy" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - monitoring-network
      - default

  loki-init:
    container_name: sihsalus-loki-init
    image: alpine:3.23
    profiles: [ monitoring ]
    restart: "no"
    user: "0"
    command: chown -R 10001:10001 /loki
    volumes:
      - loki-data:/loki
    networks:
      - monitoring-network

  loki:
    container_name: sihsalus-loki
    image: grafana/loki:3.6
    restart: "unless-stopped"
    profiles: [ monitoring ]
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    depends_on:
      loki-init:
        condition: service_completed_successfully
    networks:
      - monitoring-network

  alloy:
    container_name: sihsalus-alloy
    image: grafana/alloy:v1.13.1
    restart: "unless-stopped"
    profiles: [ logs ]
    ports:
      - "127.0.0.1:12345:12345"
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy
    healthcheck:
      test: [ "CMD-SHELL", "pgrep alloy > /dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - loki
      - prometheus
    networks:
      - monitoring-network
      - default
