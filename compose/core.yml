# Core services: gateway, frontend, backend, db

services:
  gateway:
    container_name: sihsalus-gateway
    build:
      context: ./gateway
    restart: "unless-stopped"
    # El gateway arranca apenas existen los contenedores upstream; NO espera a que
    # el backend termine de inicializar (la primera carga de datos puede tardar
    # >30 min). Mientras tanto nginx responde con la pagina "sistema iniciando"
    # (ver @backend_unavailable en los templates).
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_started
    ports:
      - "80:80"
    environment:
      FRAME_ANCESTORS: ${FRAME_ANCESTORS:-}
      FUA_CONFIG: ${FUA_CONFIG:-}
      FUA_LOCATIONS: ${FUA_LOCATIONS:-}
    healthcheck:
      # /health lo sirve el propio nginx: mide la salud del gateway, no la de
      # los upstreams ("/" redirige 301 al frontend y acoplaria ambos estados).
      test: [ "CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    container_name: sihsalus-frontend
    image: ${FRONTEND_RUNTIME_IMAGE:-sihsalus-frontend-runtime}:${FRONTEND_RUNTIME_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        FRONTEND_SOURCE_IMAGE: ghcr.io/sihsalus/sihsalus-frontend:${FRONTEND_SOURCE_TAG:-latest}
        SPA_PATH: /openmrs/spa
        API_URL: /openmrs
        SPA_CONFIG_URLS: /openmrs/spa/frontend.json
        SPA_DEFAULT_LOCALE: es
        STRIP_SOURCE_MAPS: ${STRIP_SOURCE_MAPS:-true}
    restart: "unless-stopped"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://127.0.0.1/ | grep -q 'initializeSpa'" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      backend:
        condition: service_started

  backend:
    container_name: sihsalus-backend
    image: ghcr.io/sihsalus/sihsalus-backend:${BACKEND_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: "unless-stopped"
    depends_on:
      db:
        condition: service_healthy
      backend-oauth2-config:
        condition: service_completed_successfully
    environment:
      OMRS_CONFIG_MODULE_WEB_ADMIN: "false"
      OMRS_CONFIG_AUTO_UPDATE_DATABASE: "true"
      OMRS_CONFIG_CREATE_TABLES: "true"
      OMRS_CONFIG_CONNECTION_SERVER: db
      OMRS_CONFIG_CONNECTION_DATABASE: openmrs
      OMRS_CONFIG_CONNECTION_USERNAME: ${OPENMRS_DB_USER:-openmrs}
      OMRS_CONFIG_CONNECTION_PASSWORD: ${MYSQL_OPENMRS_PASSWORD:-openmrs}
      OMRS_OCL_TOKEN: ${OMRS_OCL_TOKEN:-}
      OAUTH2_ENABLED: "false"
      OAUTH2_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET:-}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}
    healthcheck:
      # /health/started solo responde 200 cuando OpenMRS termino de inicializar.
      # Si falla, Docker conserva este mensaje en el historial del healthcheck,
      # util para distinguir bootstrap pendiente de proceso caido.
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8080/openmrs/health/started || { echo OpenMRS_bootstrap_pending_check_initialsetup_and_backend_logs_for_OCL_import_errors; exit 1; }" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 43200s
    volumes:
      - openmrs-data:/openmrs/data

  # Generate the effective oauth2login configuration in the shared data volume.
  # The Keycloak override changes OAUTH2_ENABLED to true and requires its secret.
  backend-oauth2-config:
    container_name: sihsalus-backend-oauth2-config
    image: alpine:3.23
    restart: "no"
    user: "0:0"
    environment:
      OAUTH2_ENABLED: "false"
      OAUTH2_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET:-}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}
    command:
      - sh
      - -euc
      - |
        mkdir -p /openmrs/data
        cat > /openmrs/data/oauth2.properties <<EOF
        oauth2.enabled=$${OAUTH2_ENABLED}
        userAuthorizationUri=$${KEYCLOAK_PUBLIC_URL}/realms/openmrs/protocol/openid-connect/auth
        accessTokenUri=http://keycloak:8080/realms/openmrs/protocol/openid-connect/token
        userInfoUri=http://keycloak:8080/realms/openmrs/protocol/openid-connect/userinfo
        keysUrl=http://keycloak:8080/realms/openmrs/protocol/openid-connect/certs
        logoutUri=$${KEYCLOAK_PUBLIC_URL}/realms/openmrs/protocol/openid-connect/logout
        clientId=openmrs
        clientSecret=$${OAUTH2_CLIENT_SECRET}
        scope=openid,profile,email
        openmrs.mapping.user.username=preferred_username
        openmrs.mapping.person.givenName=given_name
        openmrs.mapping.person.familyName=family_name
        openmrs.mapping.user.email=email
        openmrs.mapping.user.systemId=sub
        EOF
        chmod 644 /openmrs/data/oauth2.properties
    volumes:
      - openmrs-data:/openmrs/data

  db:
    container_name: sihsalus-db-master
    image: mariadb:10.11.7
    restart: "unless-stopped"
    command: "mariadbd --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci --server-id=1 --log-bin=mysql-bin --binlog-format=ROW --sync-binlog=1 --log-slave-updates=1"
    healthcheck:
      test: [ "CMD-SHELL", "mariadb --user=\"$${MYSQL_USER}\" --password=\"$${MYSQL_PASSWORD}\" --execute 'SHOW DATABASES;'" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      MYSQL_DATABASE: openmrs
      MYSQL_USER: ${OPENMRS_DB_USER:-openmrs}
      MYSQL_PASSWORD: ${MYSQL_OPENMRS_PASSWORD:-openmrs}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-openmrs}
      OMRS_DB_REPL_USER: ${OMRS_DB_REPL_USER:-openmrs_repl}
      OMRS_DB_REPL_PASSWORD: ${OMRS_DB_REPL_PASSWORD:-}
      OMRS_DB_BACKUP_USER: ${OMRS_DB_BACKUP_USER:-openmrs_backup}
      OMRS_DB_BACKUP_PASSWORD: ${OMRS_DB_BACKUP_PASSWORD:-}
    volumes:
      - ./scripts/database/db_init_master.sh:/docker-entrypoint-initdb.d/db_init_master.sh
      - db-data:/var/lib/mysql
      - db-backup:/backup
