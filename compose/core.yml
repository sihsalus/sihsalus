# Core services: gateway, frontend, backend, db

services:
  gateway:
    container_name: sihsalus-gateway
    build:
      context: ./gateway
    restart: "unless-stopped"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      FRAME_ANCESTORS: ${FRAME_ANCESTORS:-}
      FUA_CONFIG: ${FUA_CONFIG:-}
      FUA_LOCATIONS: ${FUA_LOCATIONS:-}
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    container_name: sihsalus-frontend
    image: ${FRONTEND_RUNTIME_IMAGE:-sihsalus-frontend-runtime}:${FRONTEND_RUNTIME_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        FRONTEND_SOURCE_IMAGE: ghcr.io/sihsalus/sihsalus-frontend:${FRONTEND_SOURCE_TAG:-latest}
        SPA_PATH: /openmrs/spa
        API_URL: /openmrs
        SPA_CONFIG_URLS: /openmrs/spa/frontend.json
        SPA_DEFAULT_LOCALE: es
    restart: "unless-stopped"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://127.0.0.1/ | grep -q 'initializeSpa'" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      backend:
        condition: service_started

  backend:
    container_name: sihsalus-backend
    image: ${SIHSALUS_BACKEND_IMAGE:-ghcr.io/sihsalus/sihsalus-core:latest}
    restart: "unless-stopped"
    depends_on:
      db:
        condition: service_healthy
    environment:
      OPENMRS_APPLICATION_DATA_DIRECTORY: /openmrs/data
      SERVER_SERVLET_CONTEXT_PATH: /openmrs
      SIHSALUS_DATASOURCE_URL: jdbc:postgresql://db:5432/${SIHSALUS_POSTGRES_DB:-sihsalus}
      SIHSALUS_DATASOURCE_USERNAME: ${SIHSALUS_POSTGRES_USER:-sihsalus}
      SIHSALUS_DATASOURCE_PASSWORD: ${SIHSALUS_POSTGRES_PASSWORD:?SIHSALUS_POSTGRES_PASSWORD is required}
      SIHSALUS_ADMIN_USERNAME: ${SIHSALUS_ADMIN_USERNAME:-admin}
      SIHSALUS_ADMIN_PASSWORD: ${SIHSALUS_ADMIN_PASSWORD:?SIHSALUS_ADMIN_PASSWORD is required}
      INITIALIZER_STARTUP_LOAD: ${INITIALIZER_STARTUP_LOAD:-}
      JAVA_OPTS: ${JAVA_OPTS:-}
      SIHSALUS_OCL_STATIC_IMPORT_ENABLED: ${SIHSALUS_OCL_STATIC_IMPORT_ENABLED:-true}
      SIHSALUS_OCL_STATIC_IMPORT_FAIL_ON_ERRORS: ${SIHSALUS_OCL_STATIC_IMPORT_FAIL_ON_ERRORS:-true}
      OAUTH2_ENABLED: ${OAUTH2_ENABLED:-false}
      OAUTH2_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET:-}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/openmrs/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 2m
    volumes:
      - openmrs-data:/openmrs/data
      - ./keycloak/oauth2.properties:/openmrs/data/oauth2.properties:ro

  db:
    container_name: sihsalus-postgres
    image: postgres:16-alpine
    restart: "unless-stopped"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      POSTGRES_DB: ${SIHSALUS_POSTGRES_DB:-sihsalus}
      POSTGRES_USER: ${SIHSALUS_POSTGRES_USER:-sihsalus}
      POSTGRES_PASSWORD: ${SIHSALUS_POSTGRES_PASSWORD:?SIHSALUS_POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
