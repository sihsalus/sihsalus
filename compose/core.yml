# Core services: gateway, frontend, backend, db

services:
  gateway:
    container_name: sihsalus-gateway
    build:
      context: ./gateway
    restart: "unless-stopped"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      FRAME_ANCESTORS: ${FRAME_ANCESTORS:-}
      FUA_CONFIG: ${FUA_CONFIG:-}
      FUA_LOCATIONS: ${FUA_LOCATIONS:-}
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    container_name: sihsalus-frontend
    image: ${FRONTEND_RUNTIME_IMAGE:-sihsalus-frontend-runtime}:${FRONTEND_RUNTIME_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        FRONTEND_SOURCE_IMAGE: ${FRONTEND_SOURCE_IMAGE:-ghcr.io/sihsalus/sihsalus-frontend:${FRONTEND_SOURCE_TAG:-latest}}
        SPA_PATH: /openmrs/spa
        API_URL: /openmrs
        SPA_CONFIG_URLS: /openmrs/spa/frontend.json
        SPA_DEFAULT_LOCALE: es
    restart: "unless-stopped"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://127.0.0.1/ | grep -q 'initializeSpa'" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      backend:
        condition: service_started

  backend:
    container_name: sihsalus-backend
    image: ${SIHSALUS_BACKEND_IMAGE:-ghcr.io/sihsalus/sihsalus-core:latest}
    restart: "unless-stopped"
    depends_on:
      db:
        condition: service_healthy
      backend-oauth2-config:
        condition: service_completed_successfully
    environment:
      OPENMRS_APPLICATION_DATA_DIRECTORY: /openmrs/data
      SIHSALUS_INITIALIZER_SOURCE_ROOT: ${SIHSALUS_INITIALIZER_SOURCE_ROOT:-/opt/sihsalus/reference-sources/sihsalus-content}
      SERVER_SERVLET_CONTEXT_PATH: /openmrs
      SIHSALUS_DATASOURCE_URL: jdbc:postgresql://db:5432/${SIHSALUS_POSTGRES_DB:-sihsalus}
      SIHSALUS_DATASOURCE_USERNAME: ${SIHSALUS_POSTGRES_USER:-sihsalus}
      SIHSALUS_DATASOURCE_PASSWORD: ${SIHSALUS_POSTGRES_PASSWORD:?SIHSALUS_POSTGRES_PASSWORD is required}
      SIHSALUS_ADMIN_USERNAME: ${SIHSALUS_ADMIN_USERNAME:-admin}
      SIHSALUS_ADMIN_PASSWORD: ${SIHSALUS_ADMIN_PASSWORD:?SIHSALUS_ADMIN_PASSWORD is required}
      INITIALIZER_STARTUP_LOAD: ${INITIALIZER_STARTUP_LOAD:-}
      JAVA_OPTS: ${JAVA_OPTS:-}
      SIHSALUS_INITIALIZER_EXCLUDE_ADDRESSHIERARCHY: ${INITIALIZER_EXCLUDE_ADDRESSHIERARCHY:-false}SIHSALUS_OCL_STATIC_IMPORT_ENABLED: ${SIHSALUS_OCL_STATIC_IMPORT_ENABLED:-true}
      SIHSALUS_OCL_STATIC_IMPORT_FAIL_ON_ERRORS: ${SIHSALUS_OCL_STATIC_IMPORT_FAIL_ON_ERRORS:-true}
      OAUTH2_ENABLED: "false"
      OAUTH2_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET:-}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS \"http://localhost:8080$${SERVER_SERVLET_CONTEXT_PATH:-/openmrs}/actuator/health/readiness\" >/dev/null" ]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 45m
    volumes:
      - openmrs-data:/openmrs/data

  backend-oauth2-config:
    container_name: sihsalus-backend-oauth2-config
    image: alpine:3.20
    restart: "no"
    user: "0:0"
    command:
      - sh
      - -euc
      - |
        mkdir -p /openmrs/data
        cat > /openmrs/data/oauth2.properties <<'EOF'
        oauth2.enabled=false
        EOF
        chmod 644 /openmrs/data/oauth2.properties
    volumes:
      - openmrs-data:/openmrs/data

  db:
    container_name: sihsalus-postgres
    image: postgres:16-alpine
    restart: "unless-stopped"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      POSTGRES_DB: ${SIHSALUS_POSTGRES_DB:-sihsalus}
      POSTGRES_USER: ${SIHSALUS_POSTGRES_USER:-sihsalus}
      POSTGRES_PASSWORD: ${SIHSALUS_POSTGRES_PASSWORD:?SIHSALUS_POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
