# Medical Imaging Stack (DICOM/OHIF/Orthanc)
# Profile: imaging

services:
  ohif:
    container_name: sihsalus-ohif
    image: ohif/app:v3.9.3
    restart: "unless-stopped"
    profiles: [ imaging ]
    ports:
      # Solo host: el acceso de usuarios es via gateway (/imaging/).
      - "127.0.0.1:3000:80"
    volumes:
      - ./imaging/app-config.js:/usr/share/nginx/html/app-config.js:ro
    depends_on:
      - orthanc
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - default

  orthanc:
    container_name: sihsalus-orthanc
    image: orthancteam/orthanc:25.8.2
    restart: "unless-stopped"
    profiles: [ imaging ]
    ports:
      # Orthanc corre con AuthenticationEnabled=false: su HTTP (8042) NO debe
      # exponerse a la red. El acceso web es via gateway (/orthanc/, /dicom-web/).
      - "127.0.0.1:8042:8042"
      # Seguro por defecto. Define DICOM_BIND_ADDRESS con la IP LAN concreta
      # solo cuando las modalidades deban enviar estudios a este host.
      - "${DICOM_BIND_ADDRESS:-127.0.0.1}:${DICOM_PORT:-4242}:4242"
    environment:
      ORTHANC_JSON: |
        {
          "Name": "SIHSALUS Orthanc",
          "HttpServer": {
            "ExternalRoot": "/"
          },
          "RemoteAccessAllowed": true,
          "AuthenticationEnabled": ${ORTHANC_AUTHENTICATION_ENABLED:-false},
          "RegisteredUsers": {},
          "DicomAet": "ORTHANC",
          "DicomPort": 4242,
          "DicomCheckCalledAet": ${ORTHANC_DICOM_CHECK_CALLED_AET:-true},
          "DicomWeb": {
            "Enable": true,
            "Root": "/dicom-web/",
            "EnableWado": true,
            "WadoRoot": "/wado",
            "Ssl": false
          },
          "StableAge": 60,
          "StrictAetComparison": ${ORTHANC_STRICT_AET_COMPARISON:-true},
          "HttpTimeout": 60,
          "ConcurrentJobs": 2,
          "OverwriteInstances": ${ORTHANC_OVERWRITE_INSTANCES:-false}
        }
    volumes:
      - orthanc-data:/var/lib/orthanc/db
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import http.client; conn = http.client.HTTPConnection(\"localhost\", 8042); conn.request(\"GET\", \"/system\"); res = conn.getresponse(); exit(0 if res.status == 200 else 1)'" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - default

  orthanc-proxy:
    container_name: sihsalus-orthanc-proxy
    image: nginx:1.25-alpine
    restart: "unless-stopped"
    profiles: [ imaging ]
    ports:
      # Solo host: el gateway llega por la red interna de Docker.
      - "127.0.0.1:8043:80"
    volumes:
      - ./gateway/orthanc-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - orthanc
    networks:
      - default
